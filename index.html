<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThriveLine</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <div class="screen" id="splashScreen">
            <div class="splash-content">
                <img src="ThriveLine.png" alt="ThriveLine Logo" class="logo">
                <h1>ThriveLine</h1>
                <p class="tagline">Your digital safety companion</p>
                <p class="description">Navigate the digital world with confidence.</p>
            </div>
            <button id="startBtn" class="primary-btn">Get Started <span>→</span></button>
        </div>

        <div class="screen" id="onboarding1" style="display: none;">
            <div class="onboarding-header">
                <button class="skip-link" id="skipBtn1">Skip</button>
            </div>

            <div class="onboarding-body">
                <div class="illustration-wrapper">
                    <span class="lock-badge">🔒</span>
                    <div class="shield-graphic">🛡️</div>
                </div>
                <h2>Stay Protected</h2>
                <p>We detect scams, suspicious links, and risky interactions before they become problems.</p>
            </div>

            <div class="onboarding-footer">
                <div class="dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                <button class="primary-btn" id="nextBtn1">Next <span>→</span></button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
